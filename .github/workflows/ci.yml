name: engine-cef-ci

on:
  push:
  pull_request:

jobs:
  scaffold-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure scaffold build
        run: cmake -S . -B build/ci -DENGINE_CEF_ENABLE_CEF=OFF

      - name: Build scaffold targets
        run: cmake --build build/ci -j2 --target engine_cef_bridge_frame_contract_test engine_cef_proof

      - name: Run scaffold tests
        run: ctest --test-dir build/ci --output-on-failure -R '^engine_cef_bridge_frame_contract_test$'
